 # Use DecapBridge PKCE auth (required)
backend:
  name: git-gateway
  repo: Labcrea-tor/portifolio-doriane
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/99544a72-4b93-40c1-a0c6-84f73a3a278c/pkce
  auth_token_endpoint: /sites/99544a72-4b93-40c1-a0c6-84f73a3a278c/token
  gateway_url: https://gateway.decapbridge.com

  # See who did what (optional)
  commit_messages:
    create: Create {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

# Enable PKCE fields (optional, recommended)
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

# Better Decap + Bridge logo (optional)
logo_url: https://decapbridge.com/decapcms-with-bridge.svg

# Add site links in Decap CMS (optional)
site_url: https://labcrea-tor.netlify.app
media_folder: "assets/uploads"
public_folder: "assets/uploads"

collections:
  - name: "profil"
    label: "Mon profil"
    files:
      - file: "content/data.json"
        label: "Informations du site"
        name: "data"
        fields:
          - { label: "Nom complet", name: "name", widget: "string" }
          - { label: "Titre professionnel", name: "title", widget: "string" }
          - { label: "Accroche", name: "tagline", widget: "text" }
          - { label: "Photo de profil", name: "avatar", widget: "image", required: false }
          - { label: "Téléphone affiché", name: "phone", widget: "string" }
          - { label: "Numéro WhatsApp (indicatif + chiffres, ex: 237691074758)", name: "whatsapp_number", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Localisation", name: "location", widget: "string" }
          - label: "Chiffres clés"
            name: "stats"
            widget: "list"
            fields:
              - { label: "Valeur", name: "value", widget: "string" }
              - { label: "Légende", name: "label", widget: "string" }
          - label: "Compétences"
            name: "skills"
            widget: "list"
            fields:
              - { label: "Icône (emoji)", name: "icon", widget: "string" }
              - { label: "Titre", name: "title", widget: "string" }
              - { label: "Description", name: "desc", widget: "text" }
          - label: "Projets"
            name: "projects"
            widget: "list"
            fields:
              - { label: "Icône (emoji)", name: "icon", widget: "string" }
              - { label: "Catégorie", name: "tag", widget: "string" }
              - { label: "Titre du projet", name: "title", widget: "string" }
              - { label: "Description", name: "desc", widget: "text" }
